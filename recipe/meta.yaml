{% set name = "curl-impersonate" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/lexiforest/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  - sha256: be2494020a26378ceb888c2198e3cc1b8dee1150e58e5f432aa3bb92659d8e17
    patches:
     - patches/0001-unix-makefile-fix.patch  # [unix]
     - patches/0002-windows-unvendor-zstd-zlib.patch  # [win]
     - patches/0003-linux-copy-static-libs.patch  # [linux]
  # https://github.com/lexiforest/curl-impersonate/blob/v1.2.0/.github/workflows/build-win.yaml#L20-L25
  - git_url: https://github.com/google/brotli              # [win]
    git_rev: ed738e842d2fbdf2d6459e39267a633c4a9b2f5d      # [win]
    folder: deps/brotli                                    # [win]
  # Note: boringssl and curl are patched in bld.bat
  - git_url: https://boringssl.googlesource.com/boringssl  # [win]
    git_rev: 673e61fc215b178a90c0e67858bbf162c8158993      # [win]
    folder: deps/boringssl                                 # [win]
  - git_url: https://github.com/curl/curl                  # [win]
    git_rev: curl-8_15_0                                   # [win]
    folder: deps/curl                                      # [win]
  - git_url: https://github.com/nghttp2/nghttp2            # [win]
    git_rev: 8f44147c385fb1ed93a6f39911eeb30279bfd2dd      # [win]
    folder: deps/nghttp2                                   # [win]
  - git_url: https://github.com/ngtcp2/nghttp3             # [win]
    git_rev: v1.9.0                                        # [win]
    folder: deps/nghttp3                                   # [win]
  - git_url: https://github.com/ngtcp2/ngtcp2              # [win]
    git_rev: v1.11.0                                       # [win]
    folder: deps/ngtcp2                                    # [win]

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("curl-impersonate", max_pin="x.x.x") }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - ninja-base
    - msys2-patch  # [win]
    # https://github.com/lexiforest/curl-impersonate/blob/v1.2.0/win/build.bat#L22
    - clang  # [win]
    - nasm  # [win]
    - make  # [unix]
    - libtool  # [unix]
    - automake  # [unix]
    - autoconf  # [unix]
    - pkg-config  # [unix]
    - unzip  # [unix]
  host:
    - zlib {{ zlib }}
    - zstd {{ zstd }}
  run:
    - zlib  # pinned by run_exports
    - zstd  # pinned by run_exports

test:
  commands:
    # Check if the our curl-impersonate comes with the same libs/inc as in 'lib' package in upstream
    # https://github.com/lexiforest/curl-impersonate/releases/tag/v1.2.0
    - test -f $PREFIX/lib/libcurl-impersonate.4.dylib  # [osx]
    - test -f $PREFIX/lib/libcurl-impersonate.a  # [unix]
    - test -f $PREFIX/lib/libcurl-impersonate{{ SHLIB_EXT }}  # [unix]
    - test -f $PREFIX/lib/libcurl-impersonate.so.4  # [linux]
    - test -f $PREFIX/lib/libcurl-impersonate.so.4.8.0  # [linux]
    - test -f $PREFIX/lib/libbrotlidec.a  # [linux]
    - test -f $PREFIX/lib/libbrotlienc.a  # [linux]
    - test -f $PREFIX/lib/libbrotlicommon.a  # [linux]
    - test -f $PREFIX/lib/libssl.a  # [linux]
    - test -f $PREFIX/lib/libcrypto.a  # [linux]
    - test -f $PREFIX/lib/libnghttp2.a  # [linux]
    - test -f $PREFIX/lib/libngtcp2.a  # [linux]
    - test -f $PREFIX/lib/libngtcp2_crypto_boringssl.a  # [linux]
    - test -f $PREFIX/lib/libnghttp3.a  # [linux]
    - test -f $PREFIX/lib/libz.a  # [linux]
    - test -f $PREFIX/lib/libzstd.a  # [linux]
    - if not exist %LIBRARY_LIB%\zstd.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\zlib.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\ssl.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\ngtcp2_crypto_boringssl.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\ngtcp2.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\nghttp3.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\nghttp2.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\libcurl_imp.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\libcurl.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\crypto.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\brotlienc.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\brotlidec.lib exit 1  # [win]
    - if not exist %LIBRARY_LIB%\brotlicommon.lib exit 1  # [win]
    - if not exist %LIBRARY_BIN%\zstd.exe exit 1  # [win]
    - if not exist %LIBRARY_BIN%\wcurl exit 1  # [win]
    - if not exist %LIBRARY_BIN%\zlib.dll exit 1  # [win]
    - if not exist %LIBRARY_BIN%\libcurl.dll exit 1  # [win]
    - if not exist %LIBRARY_BIN%\curl.exe exit 1  # [win]
    - if not exist %LIBRARY_BIN%\curl-config exit 1  # [win]
    - if not exist %LIBRARY_BIN%\bssl.exe exit 1  # [win]
    - if not exist %LIBRARY_BIN%\brotli.exe exit 1  # [win]
    - if not exist %LIBRARY_INC%\openssl\ssl.h exit 1  # [win]
    - if not exist %LIBRARY_INC%\ngtcp2\ngtcp2_crypto_boringssl.h exit 1  # [win]
    - if not exist %LIBRARY_INC%\nghttp3\nghttp3.h exit 1  # [win]
    - if not exist %LIBRARY_INC%\nghttp2\nghttp2.h exit 1  # [win]
    - if not exist %LIBRARY_INC%\curl\curl.h exit 1  # [win]
    - if not exist %LIBRARY_INC%\brotli\types.h exit 1  # [win]

about:
  home: https://github.com/lexiforest/curl-impersonate
  summary: A special build of curl that can impersonate the four major browsers Chrome, Edge, Safari and Firefox.
  description: |
    A special build of curl that can impersonate the four major browsers Chrome, Edge, Safari and Firefox.
    curl-impersonate is able to perform TLS and HTTP handshakes that are identical to that of a real browser.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/lexiforest/curl-impersonate
  doc_url: https://github.com/lexiforest/curl-impersonate/blob/main/README.md

extra:
  skip-lints:
    - patch_unnecessary